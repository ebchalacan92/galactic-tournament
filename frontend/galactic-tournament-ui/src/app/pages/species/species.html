<div class="container mt-4">
  <div class="row">
    <div class="col-lg-5">
      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
          <h4 class="mb-0">Registrar Especie</h4>
        </div>

        <div class="card-body">
          <form (ngSubmit)="createSpecies()">
            <div class="mb-3">
              <label class="form-label"> Nombre </label>

              <input class="form-control" type="text" [(ngModel)]="newSpecies.name" name="name" />
            </div>

            <div class="mb-3">
              <label class="form-label"> Nivel de Poder </label>

              <input
                class="form-control"
                type="number"
                [(ngModel)]="newSpecies.powerLevel"
                name="powerLevel"
              />
            </div>

            <div class="mb-3">
              <label class="form-label"> Habilidad Especial </label>

              <input
                class="form-control"
                type="text"
                [(ngModel)]="newSpecies.specialAbility"
                name="specialAbility"
              />
            </div>

            <button type="submit" class="btn btn-primary w-100">Crear Especie</button>
          </form>
        </div>
      </div>
    </div>

    <div class="col-lg-7">
      <div class="card shadow-sm">
        <div class="card-header bg-dark text-white">
          <div class="d-flex justify-content-between align-items-center">
            <h4 class="mb-0">Registro de Especies</h4>

            <span class="badge bg-success">
              {{ speciesList.length }}
            </span>
          </div>
        </div>

        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-striped table-hover">
              <thead class="table-dark">
                <tr>
                  <th>Id</th>
                  <th>Nombre</th>
                  <th>Poder</th>
                  <th>Habilidad</th>
                  <th>Victorias</th>
                </tr>
              </thead>

              <tbody>
                @for (species of speciesList; track species.id) {
                  <tr>
                    <td>{{ species.id }}</td>

                    <td>
                      <strong>
                        {{ species.name }}
                      </strong>
                    </td>

                    <td>
                      <span class="badge bg-danger">
                        {{ species.powerLevel }}
                      </span>
                    </td>

                    <td>
                      {{ species.specialAbility }}
                    </td>

                    <td>
                      <span class="badge bg-success">
                        {{ species.victories }}
                      </span>
                    </td>
                  </tr>
                }
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
